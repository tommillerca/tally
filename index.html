<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Boneheadz Gym</title>
<meta name="description" content="Boneheadz Gym: gamified calorie and macro tracking. Scan, log, earn loot, level up.">
<meta name="theme-color" content="#0d0c12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Boneheadz">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="app.css">
</head>
<body>
<div id="app">
  <main id="screen" class="screen"></main>
  <nav id="tabbar" class="tabbar" aria-label="Main">
    <button class="tab" data-tab="today" aria-label="Today">
      <svg viewBox="0 0 24 24"><path d="M12 3l8 6v11a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1V9z"/></svg>
      <span>Today</span>
    </button>
    <button class="tab" data-tab="shop" aria-label="Shop">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h2l1.2 3M7.2 7l1.6 8h9l2-6H6"/><circle cx="10" cy="19" r="1.4"/><circle cx="17" cy="19" r="1.4"/></svg>
      <span>Shop</span>
    </button>
    <button class="fab" id="fab" aria-label="Add food">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" fill="none" stroke-width="2.6" stroke-linecap="round"/></svg>
    </button>
    <button class="tab" data-tab="friends" aria-label="Crew">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3.4 19c0-3 2.5-5.2 5.6-5.2S14.6 16 14.6 19"/><path d="M15.8 5.3a3.2 3.2 0 0 1 0 5.9M17 13.9c2.1.5 3.6 2.3 3.6 5.1"/></svg>
      <span>Crew</span>
    </button>
    <button class="tab" data-tab="settings" aria-label="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2" fill="none" stroke-width="2"/><path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.4-2.3 1a7 7 0 0 0-2-1.2L14.2 3h-4l-.4 2.7a7 7 0 0 0-2 1.2l-2.3-1-2 3.4 2 1.5a7 7 0 0 0 0 2.4l-2 1.5 2 3.4 2.3-1a7 7 0 0 0 2 1.2l.4 2.7h4l.4-2.7a7 7 0 0 0 2-1.2l2.3 1 2-3.4-2-1.5c.06-.4.1-.8.1-1.2z" fill="none" stroke-width="1.6" stroke-linejoin="round"/></svg>
      <span>Settings</span>
    </button>
  </nav>
  <div id="sheets"></div>
  <div id="toast" class="toast" hidden></div>
</div>
<noscript><p style="padding:2rem;font-family:system-ui">Boneheadz Gym needs JavaScript enabled.</p></noscript>
<script type="module" src="js/app.js"></script>
</body>
</html>
